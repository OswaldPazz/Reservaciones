<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pazzesca — Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cobalt: #1B3F8B;
    --cobalt-dark: #0f2660;
    --cobalt-light: #2a56c6;
    --cream: #F7F4EE;
    --cream-dark: #EDE9DF;
    --charcoal: #1a1a1a;
    --mid: #6b6b6b;
    --light: #aaaaaa;
    --white: #ffffff;
    --green: #2E7D32;
    --green-light: #E8F5E9;
    --red: #c0392b;
    --red-light: #FDEDEC;
    --orange: #E65100;
    --orange-light: #FFF3E0;
    --blue-light: #E3F2FD;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--cobalt);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.08em;
  }

  .header-sub {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-btn {
    padding: 8px 16px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    background: transparent;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .header-btn:hover { background: rgba(255,255,255,0.1); }
  .header-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); }

  /* ─── DATE NAV ─── */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--white);
    border-bottom: 1px solid var(--cream-dark);
  }

  .date-nav-btn {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 4px;
    background: var(--white);
    cursor: pointer;
    font-size: 16px;
    color: var(--mid);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .date-nav-btn:hover { border-color: var(--cobalt); color: var(--cobalt); }

  .date-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--charcoal);
    min-width: 200px;
    text-align: center;
  }

  .date-today-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--cobalt);
    border-radius: 4px;
    background: transparent;
    color: var(--cobalt);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .date-today-btn:hover { background: var(--cobalt); color: white; }

  /* ─── STATS ─── */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    overflow-x: auto;
  }

  .stat-card {
    flex: 1;
    min-width: 100px;
    padding: 12px 16px;
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 6px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--cobalt);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--mid);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ─── RESERVATIONS LIST ─── */
  .reservations {
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 100px;
  }

  .reservation-card {
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.15s;
    border-left: 4px solid var(--cream-dark);
  }

  .reservation-card.status-Confirmada { border-left-color: var(--green); }
  .reservation-card.status-Pendiente { border-left-color: var(--orange); }
  .reservation-card.status-Cancelada { border-left-color: var(--red); opacity: 0.6; }
  .reservation-card.status-Completada { border-left-color: var(--cobalt); opacity: 0.7; }
  .reservation-card.status-Manual { border-left-color: var(--cobalt-light); }

  .res-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--cobalt);
    min-width: 80px;
    text-align: center;
  }

  .res-info {
    flex: 1;
  }

  .res-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--charcoal);
  }

  .res-details {
    font-size: 12px;
    font-weight: 300;
    color: var(--mid);
    margin-top: 2px;
  }

  .res-notes {
    font-size: 11px;
    font-weight: 300;
    color: var(--cobalt);
    font-style: italic;
    margin-top: 4px;
  }

  .res-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .res-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .res-btn.confirm { background: var(--green-light); color: var(--green); }
  .res-btn.confirm:hover { background: var(--green); color: white; }
  .res-btn.cancel { background: var(--red-light); color: var(--red); }
  .res-btn.cancel:hover { background: var(--red); color: white; }
  .res-btn.complete { background: var(--blue-light); color: var(--cobalt); }
  .res-btn.complete:hover { background: var(--cobalt); color: white; }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge-Pendiente { background: var(--orange-light); color: var(--orange); }
  .badge-Confirmada { background: var(--green-light); color: var(--green); }
  .badge-Cancelada { background: var(--red-light); color: var(--red); }
  .badge-Completada { background: var(--blue-light); color: var(--cobalt); }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--light);
    font-size: 14px;
    font-weight: 300;
  }

  .loading-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--mid);
    font-size: 14px;
  }

  /* ─── FAB ─── */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--cobalt);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(27,63,139,0.35);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  .fab:hover { transform: scale(1.08); background: var(--cobalt-dark); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
  }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 24px;
    color: var(--charcoal);
  }

  .modal-group { margin-bottom: 16px; }

  .modal-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 6px;
  }

  .modal-group input,
  .modal-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--charcoal);
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    background: var(--white);
  }

  .modal-group input:focus,
  .modal-group select:focus {
    border-color: var(--cobalt);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .modal-btn.primary { background: var(--cobalt); color: white; }
  .modal-btn.primary:hover { background: var(--cobalt-dark); }
  .modal-btn.secondary { background: var(--cream); color: var(--mid); }
  .modal-btn.secondary:hover { background: var(--cream-dark); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .reservation-card { flex-direction: column; align-items: flex-start; gap: 10px; }
    .res-time { min-width: auto; }
    .res-actions { width: 100%; }
    .res-btn { flex: 1; text-align: center; }
    .stats-bar { flex-wrap: nowrap; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reservation-card { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-title">Pazzesca</div>
    <div class="header-sub">Panel de reservaciones</div>
  </div>
  <div class="header-actions">
    <button class="header-btn" id="btnRefresh" onclick="loadReservations()">Actualizar</button>
  </div>
</div>

<!-- DATE NAV -->
<div class="date-nav">
  <button class="date-nav-btn" onclick="changeDate(-1)">&#8592;</button>
  <span class="date-label" id="dateLabel"></span>
  <button class="date-nav-btn" onclick="changeDate(1)">&#8594;</button>
  <button class="date-today-btn" onclick="goToday()">Hoy</button>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" id="statPendiente">-</div><div class="stat-label">Pendientes</div></div>
  <div class="stat-card"><div class="stat-num" id="statConfirmada">-</div><div class="stat-label">Confirmadas</div></div>
  <div class="stat-card"><div class="stat-num" id="statPersonas">-</div><div class="stat-label">Personas</div></div>
</div>

<!-- RESERVATIONS -->
<div class="reservations" id="reservationsList">
  <div class="loading-state">Cargando reservaciones...</div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Agregar reservacion manual</h2>
    <div class="modal-group">
      <label>Nombre</label>
      <input type="text" id="mNombre" placeholder="Nombre del cliente">
    </div>
    <div class="modal-group">
      <label>Telefono</label>
      <input type="tel" id="mTelefono" placeholder="10 digitos (opcional)">
    </div>
    <div class="modal-group">
      <label>Fecha</label>
      <input type="date" id="mFecha">
    </div>
    <div class="modal-group">
      <label>Hora</label>
      <input type="time" id="mHora">
    </div>
    <div class="modal-group">
      <label>Personas</label>
      <input type="number" id="mPersonas" min="1" max="10" value="2">
    </div>
    <div class="modal-group">
      <label>Zona</label>
      <select id="mZona">
        <option value="Sin preferencia">Sin preferencia</option>
        <option value="Interior - Mesa grande">Interior - Mesa grande</option>
        <option value="Interior - Barra">Interior - Barra</option>
        <option value="Exterior - Fachada">Exterior - Fachada</option>
        <option value="Barra cocina">Barra - Vista a cocina</option>
        <option value="Esquina">Esquina</option>
        <option value="Isla">Isla</option>
      </select>
    </div>
    <div class="modal-group">
      <label>Notas</label>
      <input type="text" id="mNotas" placeholder="Opcional">
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="addManualReservation()">Agregar</button>
    </div>
  </div>
</div>

<script>
  // ─── CONFIG ─────────────────────────────────────────────
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycby5yTnYk2Sj-6RwHMSbIAsAsE4oJEECwnbEQxAhqnhkp6v2o-dw5Q9uuEZ-UtkiypKS/exec';

  // ─── STATE ──────────────────────────────────────────────
  let currentDate = new Date();
  let allReservations = [];

  // ─── DATE UTILS ─────────────────────────────────────────
  const DAYS = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function formatDateLabel(d) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const target = new Date(d);
    target.setHours(0,0,0,0);
    const diff = (target - today) / (1000*60*60*24);

    let prefix = '';
    if (diff === 0) prefix = 'Hoy - ';
    else if (diff === 1) prefix = 'Manana - ';
    else if (diff === -1) prefix = 'Ayer - ';

    return prefix + DAYS[d.getDay()] + ' ' + d.getDate() + ' de ' + MONTHS[d.getMonth()];
  }

  function formatDateForMatch(d) {
    return DAYS[d.getDay()] + ' ' + d.getDate() + ' de ' + MONTHS[d.getMonth()];
  }

  function changeDate(offset) {
    currentDate.setDate(currentDate.getDate() + offset);
    updateView();
  }

  function goToday() {
    currentDate = new Date();
    updateView();
  }

  // ─── LOAD DATA ──────────────────────────────────────────
  async function loadReservations() {
    const list = document.getElementById('reservationsList');
    list.innerHTML = '<div class="loading-state">Cargando reservaciones...</div>';

    try {
      const response = await fetch(SHEETS_URL + '?action=getReservations');
      const result = await response.json();

      if (result.status === 'ok') {
        allReservations = result.data;
        updateView();
      } else {
        list.innerHTML = '<div class="empty-state">Error al cargar datos</div>';
      }
    } catch (e) {
      list.innerHTML = '<div class="empty-state">Error de conexion. Intenta de nuevo.</div>';
      console.error(e);
    }
  }

  // ─── UPDATE VIEW ────────────────────────────────────────
  function updateView() {
    document.getElementById('dateLabel').textContent = formatDateLabel(currentDate);

    const dateStr = formatDateForMatch(currentDate);
    const filtered = allReservations.filter(r => {
      const rDate = String(r.fechaReserva);
      return rDate.includes(dateStr);
    });

    // Sort by time
    filtered.sort((a, b) => {
      return String(a.hora).localeCompare(String(b.hora));
    });

    // Stats
    const pendientes = filtered.filter(r => r.status === 'Pendiente').length;
    const confirmadas = filtered.filter(r => r.status === 'Confirmada').length;
    const totalPersonas = filtered.reduce((sum, r) => {
      if (r.status !== 'Cancelada') return sum + (parseInt(r.personas) || 0);
      return sum;
    }, 0);

    document.getElementById('statTotal').textContent = filtered.length;
    document.getElementById('statPendiente').textContent = pendientes;
    document.getElementById('statConfirmada').textContent = confirmadas;
    document.getElementById('statPersonas').textContent = totalPersonas;

    // Render list
    const list = document.getElementById('reservationsList');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">No hay reservaciones para este dia</div>';
      return;
    }

    list.innerHTML = filtered.map((r, i) => {
      const statusClass = 'status-' + (r.status || 'Pendiente');
      const badgeClass = 'badge-' + (r.status || 'Pendiente');

      let actions = '';
      if (r.status === 'Pendiente') {
        actions = `
          <button class="res-btn confirm" onclick="updateStatus(${r.row}, 'Confirmada')">Confirmar</button>
          <button class="res-btn cancel" onclick="updateStatus(${r.row}, 'Cancelada')">Cancelar</button>
        `;
      } else if (r.status === 'Confirmada') {
        actions = `
          <button class="res-btn complete" onclick="updateStatus(${r.row}, 'Completada')">Completada</button>
          <button class="res-btn cancel" onclick="updateStatus(${r.row}, 'Cancelada')">Cancelar</button>
        `;
      }

      return `
        <div class="reservation-card ${statusClass}" style="animation-delay: ${i * 0.05}s">
          <div class="res-time">${r.hora || '--'}</div>
          <div class="res-info">
            <div class="res-name">${r.nombre || 'Sin nombre'} <span class="status-badge ${badgeClass}">${r.status || 'Pendiente'}</span></div>
            <div class="res-details">${r.personas || '?'} personas · ${r.zona || 'Sin zona'}${r.telefono ? ' · ' + r.telefono : ''}</div>
            ${r.notas ? '<div class="res-notes">' + r.notas + '</div>' : ''}
          </div>
          <div class="res-actions">${actions}</div>
        </div>
      `;
    }).join('');
  }

  // ─── UPDATE STATUS ──────────────────────────────────────
  async function updateStatus(row, newStatus) {
    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'updateStatus',
          row: row,
          status: newStatus
        })
      });

      // Update local data
      const res = allReservations.find(r => r.row === row);
      if (res) res.status = newStatus;
      updateView();

      // Reload after a moment to sync
      setTimeout(loadReservations, 2000);

    } catch (e) {
      console.error('Error updating:', e);
      alert('Error al actualizar. Intenta de nuevo.');
    }
  }

  // ─── MODAL ──────────────────────────────────────────────
  function openModal() {
    document.getElementById('modalOverlay').classList.add('show');
    // Set default date to current view date
    const d = currentDate;
    const dateStr = d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
    document.getElementById('mFecha').value = dateStr;
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('show');
    }
  }

  async function addManualReservation() {
    const nombre = document.getElementById('mNombre').value.trim();
    const telefono = document.getElementById('mTelefono').value.trim();
    const fecha = document.getElementById('mFecha').value;
    const hora = document.getElementById('mHora').value;
    const personas = document.getElementById('mPersonas').value;
    const zona = document.getElementById('mZona').value;
    const notas = document.getElementById('mNotas').value.trim();

    if (!nombre || !fecha || !hora) {
      alert('Nombre, fecha y hora son obligatorios');
      return;
    }

    // Format date like the landing does
    const [y, m, d] = fecha.split('-').map(Number);
    const dateObj = new Date(y, m - 1, d);
    const fechaTexto = DAYS[dateObj.getDay()] + ' ' + dateObj.getDate() + ' de ' + MONTHS[dateObj.getMonth()];

    // Format time to 12hr
    const [hh, mm] = hora.split(':').map(Number);
    const ampm = hh >= 12 ? 'pm' : 'am';
    const h12 = hh % 12 === 0 ? 12 : hh % 12;
    const horaTexto = h12 + ':' + String(mm).padStart(2, '0') + ' ' + ampm;

    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'addManual',
          fechaEnvio: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
          nombre: nombre,
          telefono: telefono,
          fechaReserva: fechaTexto,
          hora: horaTexto,
          personas: personas,
          zona: zona,
          notas: notas ? '(Manual) ' + notas : '(Manual)',
          status: 'Confirmada'
        })
      });

      // Reset form
      document.getElementById('mNombre').value = '';
      document.getElementById('mTelefono').value = '';
      document.getElementById('mHora').value = '';
      document.getElementById('mPersonas').value = '2';
      document.getElementById('mZona').value = 'Sin preferencia';
      document.getElementById('mNotas').value = '';

      closeModal();
      setTimeout(loadReservations, 1500);

    } catch (e) {
      console.error('Error adding:', e);
      alert('Error al agregar. Intenta de nuevo.');
    }
  }

  // ─── INIT ───────────────────────────────────────────────
  goToday();
  loadReservations();

  // Auto-refresh every 30 seconds
  setInterval(loadReservations, 30000);
</script>
