<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pazzesca — Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cobalt:#1B3F8B;--cobalt-dark:#0f2660;--cobalt-light:#2a56c6;--cream:#F7F4EE;--cream-dark:#EDE9DF;--charcoal:#1a1a1a;--mid:#6b6b6b;--light:#aaa;--white:#fff;--green:#2E7D32;--green-light:#E8F5E9;--red:#c0392b;--red-light:#FDEDEC;--orange:#E65100;--orange-light:#FFF3E0;--blue-light:#E3F2FD}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh}
.header{background:var(--cobalt);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--white);letter-spacing:.08em}
.header-sub{font-size:11px;font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.15em;text-transform:uppercase}
.header-btn{padding:8px 16px;border:1.5px solid rgba(255,255,255,.3);border-radius:4px;background:0 0;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.header-btn:hover{background:rgba(255,255,255,.1)}
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--cream-dark)}
.tab{flex:1;padding:14px 20px;text-align:center;font-size:13px;font-weight:500;color:var(--mid);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.03em}
.tab:hover{color:var(--charcoal)}
.tab.active{color:var(--cobalt);border-bottom-color:var(--cobalt)}
.tab-badge{display:inline-block;background:var(--orange);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:20px 24px;background:var(--white);border-bottom:1px solid var(--cream-dark)}
.date-nav.hidden{display:none}
.date-nav-btn{width:36px;height:36px;border:1.5px solid var(--cream-dark);border-radius:4px;background:var(--white);cursor:pointer;font-size:16px;color:var(--mid);display:flex;align-items:center;justify-content:center;transition:all .15s}
.date-nav-btn:hover{border-color:var(--cobalt);color:var(--cobalt)}
.date-label{font-size:16px;font-weight:500;color:var(--charcoal);min-width:200px;text-align:center}
.date-today-btn{padding:6px 14px;border:1.5px solid var(--cobalt);border-radius:4px;background:0 0;color:var(--cobalt);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .15s}
.date-today-btn:hover{background:var(--cobalt);color:#fff}
.stats-bar{display:flex;gap:12px;padding:16px 24px;overflow-x:auto}
.stat-card{flex:1;min-width:80px;padding:12px 16px;background:var(--white);border:1px solid var(--cream-dark);border-radius:6px;text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--cobalt);line-height:1}
.stat-label{font-size:10px;font-weight:500;color:var(--mid);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.reservations{padding:16px 24px;display:flex;flex-direction:column;gap:10px;padding-bottom:100px}
.date-group-header{font-size:12px;font-weight:600;color:var(--cobalt);letter-spacing:.1em;text-transform:uppercase;padding:12px 0 6px;border-bottom:1px solid var(--cream-dark);margin-top:8px}
.date-group-header:first-child{margin-top:0}
.reservation-card{background:var(--white);border:1px solid var(--cream-dark);border-radius:6px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:all .15s;border-left:4px solid var(--cream-dark)}
.reservation-card.status-Confirmada{border-left-color:var(--green)}
.reservation-card.status-Pendiente{border-left-color:var(--orange)}
.reservation-card.status-Cancelada{border-left-color:var(--red);opacity:.5}
.reservation-card.status-Completada{border-left-color:var(--cobalt);opacity:.6}
.res-time{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--cobalt);min-width:80px;text-align:center}
.res-info{flex:1}
.res-name{font-size:15px;font-weight:500;color:var(--charcoal)}
.res-details{font-size:12px;font-weight:300;color:var(--mid);margin-top:2px}
.res-notes{font-size:11px;font-weight:300;color:var(--cobalt);font-style:italic;margin-top:4px}
.res-actions{display:flex;gap:6px;flex-shrink:0}
.res-btn{padding:8px 14px;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.res-btn.confirm{background:var(--green-light);color:var(--green)}
.res-btn.confirm:hover{background:var(--green);color:#fff}
.res-btn.cancel{background:var(--red-light);color:var(--red)}
.res-btn.cancel:hover{background:var(--red);color:#fff}
.res-btn.complete{background:var(--blue-light);color:var(--cobalt)}
.res-btn.complete:hover{background:var(--cobalt);color:#fff}
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.badge-Pendiente{background:var(--orange-light);color:var(--orange)}
.badge-Confirmada{background:var(--green-light);color:var(--green)}
.badge-Cancelada{background:var(--red-light);color:var(--red)}
.badge-Completada{background:var(--blue-light);color:var(--cobalt)}
.empty-state{text-align:center;padding:60px 24px;color:var(--light);font-size:14px;font-weight:300}
.loading-state{text-align:center;padding:60px 24px;color:var(--mid);font-size:14px}
.grid-wrap{padding:16px 24px;overflow-x:auto;padding-bottom:100px}
.grid-table{width:100%;border-collapse:collapse;min-width:600px}
.grid-table th{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt);padding:10px 8px;text-align:center;border-bottom:2px solid var(--cobalt);position:sticky;top:0;background:var(--cream)}
.grid-table th:first-child{text-align:left;min-width:80px}
.grid-table td{padding:6px 6px;border-bottom:1px solid var(--cream-dark);vertical-align:top;text-align:center;min-width:90px}
.grid-table td:first-child{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--cobalt);text-align:left;white-space:nowrap}
.grid-table tr:hover td{background:rgba(27,63,139,.02)}
.grid-cell{display:inline-block;padding:6px 10px;border-radius:4px;font-size:11px;font-weight:500;margin:2px;line-height:1.3;max-width:100%}
.grid-cell.confirmed{background:var(--green-light);color:var(--green);border-left:3px solid var(--green)}
.grid-cell.completed{background:var(--blue-light);color:var(--cobalt);border-left:3px solid var(--cobalt);opacity:.6}
.grid-cell .cell-name{font-weight:600;display:block}
.grid-cell .cell-detail{font-size:10px;font-weight:300;opacity:.8}
.grid-empty{color:var(--cream-dark);font-size:18px}
.grid-summary{display:flex;gap:16px;padding:16px 24px;flex-wrap:wrap}
.grid-summary-item{font-size:12px;color:var(--mid);font-weight:300}
.grid-summary-item strong{color:var(--cobalt);font-weight:600}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--cobalt);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(27,63,139,.35);transition:all .2s;display:flex;align-items:center;justify-content:center;z-index:50}
.fab:hover{transform:scale(1.08);background:var(--cobalt-dark)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:8px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:24px;color:var(--charcoal)}
.modal-group{margin-bottom:16px}
.modal-group label{display:block;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:6px}
.modal-group input,.modal-group select{width:100%;padding:10px 14px;border:1.5px solid var(--cream-dark);border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--charcoal);outline:none;background:var(--white)}
.modal-group input:focus,.modal-group select:focus{border-color:var(--cobalt)}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.modal-btn{flex:1;padding:12px;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.05em;transition:all .15s}
.modal-btn.primary{background:var(--cobalt);color:#fff}
.modal-btn.primary:hover{background:var(--cobalt-dark)}
.modal-btn.secondary{background:var(--cream);color:var(--mid)}
.modal-btn.secondary:hover{background:var(--cream-dark)}
@media(max-width:600px){.reservation-card{flex-direction:column;align-items:flex-start;gap:10px}.res-time{min-width:auto}.res-actions{width:100%}.res-btn{flex:1;text-align:center}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.reservation-card{animation:fadeIn .3s ease both}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">Pazzesca</div>
    <div class="header-sub">Panel de reservaciones</div>
  </div>
  <div><button class="header-btn" onclick="loadReservations()">Actualizar</button></div>
</div>
<div class="tabs">
  <div class="tab active" id="tabPendientes" onclick="switchTab('pendientes')">Pendientes <span class="tab-badge" id="pendingBadge">0</span></div>
  <div class="tab" id="tabMapa" onclick="switchTab('mapa')">Reservaciones</div>
</div>
<div class="date-nav hidden" id="dateNav">
  <button class="date-nav-btn" onclick="changeDate(-1)">&#8592;</button>
  <span class="date-label" id="dateLabel"></span>
  <button class="date-nav-btn" onclick="changeDate(1)">&#8594;</button>
  <button class="date-today-btn" onclick="goToday()">Hoy</button>
</div>
<div class="stats-bar">
  <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" id="statPendiente">-</div><div class="stat-label">Pendientes</div></div>
  <div class="stat-card"><div class="stat-num" id="statConfirmada">-</div><div class="stat-label">Confirmadas</div></div>
  <div class="stat-card"><div class="stat-num" id="statPersonas">-</div><div class="stat-label">Personas</div></div>
</div>
<div class="reservations" id="reservationsList">
  <div class="loading-state">Cargando reservaciones...</div>
</div>
<button class="fab" onclick="openModal()">+</button>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Agregar reservacion manual</h2>
    <div class="modal-group"><label>Nombre</label><input type="text" id="mNombre" placeholder="Nombre del cliente"></div>
    <div class="modal-group"><label>Telefono</label><input type="tel" id="mTelefono" placeholder="10 digitos (opcional)"></div>
    <div class="modal-group"><label>Fecha</label><input type="date" id="mFecha"></div>
    <div class="modal-group"><label>Hora</label><input type="time" id="mHora"></div>
    <div class="modal-group"><label>Personas</label><input type="number" id="mPersonas" min="1" max="10" value="2"></div>
    <div class="modal-group"><label>Zona</label><select id="mZona"><option value="Sin preferencia">Sin preferencia</option><option value="Interior - Mesa grande">Interior - Mesa grande</option><option value="Interior - Barra">Interior - Barra</option><option value="Exterior - Fachada">Exterior - Fachada</option><option value="Barra cocina">Barra - Vista a cocina</option><option value="Esquina">Esquina</option><option value="Isla">Isla</option></select></div>
    <div class="modal-group"><label>Notas</label><input type="text" id="mNotas" placeholder="Opcional"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="addManualReservation()">Agregar</button>
    </div>
  </div>
</div>
<script>
var SHEETS_URL='https://script.google.com/macros/s/AKfycby5yTnYk2Sj-6RwHMSbIAsAsE4oJEECwnbEQxAhqnhkp6v2o-dw5Q9uuEZ-UtkiypKS/exec';
var currentDate=new Date();
var allReservations=[];
var currentView='pendientes';
var DAYS=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function formatDateLabel(d){
  var today=new Date();today.setHours(0,0,0,0);
  var target=new Date(d);target.setHours(0,0,0,0);
  var diff=(target-today)/(1000*60*60*24);
  var prefix='';
  if(diff===0)prefix='Hoy - ';
  else if(diff===1)prefix='Manana - ';
  else if(diff===-1)prefix='Ayer - ';
  return prefix+DAYS[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()];
}
function formatDateForMatch(d){return DAYS[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()];}
function changeDate(o){currentDate.setDate(currentDate.getDate()+o);updateView();}
function goToday(){currentDate=new Date();updateView();}

function switchTab(v){
  currentView=v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('tabPendientes').classList.toggle('active',v==='pendientes');
  document.getElementById('tabMapa').classList.toggle('active',v==='mapa');
  document.getElementById('dateNav').classList.toggle('hidden',v!=='mapa');
  updateView();
}

async function loadReservations(silent){
  var list=document.getElementById('reservationsList');
  if(!silent)list.innerHTML='<div class="loading-state">Cargando reservaciones...</div>';
  try{
    var r=await fetch(SHEETS_URL+'?action=getReservations');
    var result=await r.json();
    if(result.status==='ok'){allReservations=result.data;updateView();}
    else if(!silent){list.innerHTML='<div class="empty-state">Error al cargar datos</div>';}
  }catch(e){if(!silent)list.innerHTML='<div class="empty-state">Error de conexion. Intenta de nuevo.</div>';console.error(e);}
}

function updateView(){
  if(currentView==='pendientes')renderPendientes();
  else if(currentView==='mapa')renderMapa();
  var tp=allReservations.filter(function(r){return r.status==='Pendiente'}).length;
  document.getElementById('pendingBadge').textContent=tp;
  document.getElementById('pendingBadge').style.display=tp>0?'inline-block':'none';
}

function renderPendientes(){
  var filtered=allReservations.filter(function(r){return r.status==='Pendiente'});
  var groups={};
  filtered.forEach(function(r){var k=String(r.fechaReserva)||'Sin fecha';if(!groups[k])groups[k]=[];groups[k].push(r)});
  Object.keys(groups).forEach(function(k){groups[k].sort(function(a,b){return String(a.hora).localeCompare(String(b.hora))})});
  document.getElementById('statTotal').textContent=filtered.length;
  document.getElementById('statPendiente').textContent=filtered.length;
  document.getElementById('statConfirmada').textContent='0';
  document.getElementById('statPersonas').textContent=filtered.reduce(function(s,r){return s+(parseInt(r.personas)||0)},0);
  var list=document.getElementById('reservationsList');
  if(filtered.length===0){list.innerHTML='<div class="empty-state">No hay reservaciones pendientes. Todo confirmado.</div>';return;}
  var html='';
  Object.keys(groups).forEach(function(dk){html+='<div class="date-group-header">'+dk+'</div>';groups[dk].forEach(function(r,i){html+=renderCard(r,i)})});
  list.innerHTML=html;
}

function renderMapa(){
  document.getElementById('dateLabel').textContent=formatDateLabel(currentDate);
  var ds=formatDateForMatch(currentDate);
  var filtered=allReservations.filter(function(r){
    return String(r.fechaReserva).indexOf(ds)!==-1 && (r.status==='Confirmada'||r.status==='Completada');
  });

  var ZONES=['Interior - Mesa grande','Interior - Barra','Exterior - Fachada','Barra cocina','Esquina','Isla'];
  var ZONE_SHORT=['Interior','Barra','Fachada','Cocina','Esquina','Isla'];

  // Collect all time slots from confirmed reservations
  var timeSet={};
  filtered.forEach(function(r){if(r.hora)timeSet[String(r.hora)]=true});
  var times=Object.keys(timeSet).sort();

  // Also check pending count for this day
  var pendingToday=allReservations.filter(function(r){
    return String(r.fechaReserva).indexOf(ds)!==-1 && r.status==='Pendiente';
  }).length;

  // Stats
  var totalPersonas=filtered.reduce(function(s,r){return s+(parseInt(r.personas)||0)},0);
  document.getElementById('statTotal').textContent=filtered.length;
  document.getElementById('statPendiente').textContent=pendingToday;
  document.getElementById('statConfirmada').textContent=filtered.filter(function(r){return r.status==='Confirmada'}).length;
  document.getElementById('statPersonas').textContent=totalPersonas;

  var list=document.getElementById('reservationsList');

  if(filtered.length===0 && pendingToday===0){
    list.innerHTML='<div class="empty-state">No hay reservaciones para este dia</div>';
    return;
  }

  if(filtered.length===0 && pendingToday>0){
    list.innerHTML='<div class="empty-state">No hay reservaciones confirmadas para este dia.<br><br><strong>'+pendingToday+' pendiente(s) por confirmar.</strong></div>';
    return;
  }

  // Build grid: rows=times, cols=zones
  var grid={};
  filtered.forEach(function(r){
    var t=String(r.hora)||'--';
    var z=String(r.zona)||'Sin preferencia';
    if(!grid[t])grid[t]={};
    if(!grid[t][z])grid[t][z]=[];
    grid[t][z].push(r);
  });

  var html='';

  // Pending warning
  if(pendingToday>0){
    html+='<div style="background:var(--orange-light);color:var(--orange);padding:12px 16px;border-radius:6px;font-size:13px;font-weight:500;margin-bottom:12px">'+pendingToday+' reservacion(es) pendiente(s) por confirmar para este dia</div>';
  }

  // Summary
  html+='<div class="grid-summary">';
  html+='<div class="grid-summary-item"><strong>'+filtered.length+'</strong> reservaciones</div>';
  html+='<div class="grid-summary-item"><strong>'+totalPersonas+'</strong> personas esperadas</div>';
  html+='</div>';

  // Table
  html+='<div class="grid-wrap"><table class="grid-table"><thead><tr><th>Hora</th>';
  ZONE_SHORT.forEach(function(z){html+='<th>'+z+'</th>'});
  html+='<th>Otra</th></tr></thead><tbody>';

  times.forEach(function(t){
    html+='<tr><td>'+t+'</td>';
    ZONES.forEach(function(z){
      var cells=grid[t]&&grid[t][z]?grid[t][z]:[];
      if(cells.length>0){
        html+='<td>';
        cells.forEach(function(r){
          var cls=r.status==='Completada'?'completed':'confirmed';
          html+='<div class="grid-cell '+cls+'"><span class="cell-name">'+r.nombre+'</span><span class="cell-detail">'+r.personas+' pers.</span></div>';
        });
        html+='</td>';
      }else{
        html+='<td><span class="grid-empty">-</span></td>';
      }
    });
    // "Otra" column for Sin preferencia or unmatched zones
    var otras=[];
    if(grid[t]){
      Object.keys(grid[t]).forEach(function(z){
        if(ZONES.indexOf(z)===-1){otras=otras.concat(grid[t][z])}
      });
    }
    if(otras.length>0){
      html+='<td>';
      otras.forEach(function(r){
        html+='<div class="grid-cell confirmed"><span class="cell-name">'+r.nombre+'</span><span class="cell-detail">'+r.personas+' pers.</span></div>';
      });
      html+='</td>';
    }else{
      html+='<td><span class="grid-empty">-</span></td>';
    }
    html+='</tr>';
  });

  html+='</tbody></table></div>';
  list.innerHTML=html;
}

function renderCard(r,i){
  var sc='status-'+(r.status||'Pendiente');
  var bc='badge-'+(r.status||'Pendiente');
  var actions='';
  if(r.status==='Pendiente'){
    actions='<button class="res-btn confirm" onclick="updateStatus('+r.row+',\'Confirmada\')">Confirmar</button><button class="res-btn cancel" onclick="updateStatus('+r.row+',\'Cancelada\')">Cancelar</button>';
  }else if(r.status==='Confirmada'){
    actions='<button class="res-btn complete" onclick="updateStatus('+r.row+',\'Completada\')">Completada</button><button class="res-btn cancel" onclick="updateStatus('+r.row+',\'Cancelada\')">Cancelar</button>';
  }
  return '<div class="reservation-card '+sc+'" style="animation-delay:'+(i*.05)+'s"><div class="res-time">'+(r.hora||'--')+'</div><div class="res-info"><div class="res-name">'+(r.nombre||'Sin nombre')+' <span class="status-badge '+bc+'">'+(r.status||'Pendiente')+'</span></div><div class="res-details">'+(r.personas||'?')+' personas - '+(r.zona||'Sin zona')+(r.telefono?' - '+r.telefono:'')+'</div>'+(r.notas?'<div class="res-notes">'+r.notas+'</div>':'')+'</div><div class="res-actions">'+actions+'</div></div>';
}

async function updateStatus(row,ns){
  var btns=event.target.parentElement.querySelectorAll('.res-btn');
  btns.forEach(function(b){b.disabled=true;b.style.opacity='.5'});
  event.target.textContent='Procesando...';
  try{
    await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateStatus',row:row,status:ns})});
    var res=allReservations.find(function(r){return r.row===row});
    if(res)res.status=ns;
    updateView();
    setTimeout(function(){loadReservations(true)},2000);
  }catch(e){console.error('Error:',e);alert('Error al actualizar.');}
}

function openModal(){
  document.getElementById('modalOverlay').classList.add('show');
  var d=currentDate;
  document.getElementById('mFecha').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');}

async function addManualReservation(){
  var nombre=document.getElementById('mNombre').value.trim();
  var telefono=document.getElementById('mTelefono').value.trim();
  var fecha=document.getElementById('mFecha').value;
  var hora=document.getElementById('mHora').value;
  var personas=document.getElementById('mPersonas').value;
  var zona=document.getElementById('mZona').value;
  var notas=document.getElementById('mNotas').value.trim();
  if(!nombre||!fecha||!hora){alert('Nombre, fecha y hora son obligatorios');return;}
  var parts=fecha.split('-').map(Number);
  var dateObj=new Date(parts[0],parts[1]-1,parts[2]);
  var fechaTexto=DAYS[dateObj.getDay()]+' '+dateObj.getDate()+' de '+MONTHS[dateObj.getMonth()];
  var tp=hora.split(':').map(Number);
  var ampm=tp[0]>=12?'pm':'am';
  var h12=tp[0]%12===0?12:tp[0]%12;
  var horaTexto=h12+':'+String(tp[1]).padStart(2,'0')+' '+ampm;
  try{
    await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addManual',fechaEnvio:new Date().toLocaleString('es-MX',{timeZone:'America/Mexico_City'}),nombre:nombre,telefono:telefono,fechaReserva:fechaTexto,hora:horaTexto,personas:personas,zona:zona,notas:notas?'(Manual) '+notas:'(Manual)',status:'Confirmada'})});
    document.getElementById('mNombre').value='';document.getElementById('mTelefono').value='';document.getElementById('mHora').value='';document.getElementById('mPersonas').value='2';document.getElementById('mZona').value='Sin preferencia';document.getElementById('mNotas').value='';
    closeModal();setTimeout(function(){loadReservations(true)},1500);
  }catch(e){console.error('Error:',e);alert('Error al agregar.');}
}

goToday();loadReservations(false);setInterval(function(){loadReservations(true)},30000);
</script>
